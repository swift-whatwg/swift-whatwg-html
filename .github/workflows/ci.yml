name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + test matrix — see swift-standards/.github/.github/workflows/swift-ci.yml (layer wrapper)
  ci:
    uses: swift-standards/.github/.github/workflows/swift-ci.yml@main
    secrets: inherit

  # DocC umbrella-catalog pipeline per [DOC-019a] — see
  # swift-institute/.github/.github/workflows/swift-docs.yml
  docs:
    uses: swift-institute/.github/.github/workflows/swift-docs.yml@main
    secrets: inherit
